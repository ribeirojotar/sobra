<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sobra — Sem conexão</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      background: #f0fdf4;
      color: #064e3b;
      text-align: center;
      padding: 1.5rem;
      gap: 1rem;
    }
    .icon { font-size: 3rem; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p { color: #065f46; max-width: 280px; line-height: 1.5; }
    button {
      margin-top: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📵</div>
  <h1>Você está offline</h1>
  <p>Reconecte-se à internet para acessar o Sobra.</p>
  <button onclick="window.location.reload()">Tentar novamente</button>
</body>
</html>
